<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F53003;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)"/>
  
  <!-- Ballot box -->
  <rect x="25" y="45" width="50" height="35" rx="3" fill="white" opacity="0.95"/>
  <rect x="25" y="45" width="50" height="8" rx="3" fill="white"/>
  
  <!-- Ballot paper being inserted -->
  <rect x="42" y="20" width="16" height="28" rx="1" fill="white" opacity="0.95"/>
  <line x1="45" y1="26" x2="55" y2="26" stroke="#F53003" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="45" y1="31" x2="55" y2="31" stroke="#F53003" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="45" y1="36" x2="52" y2="36" stroke="#F53003" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Check mark on ballot -->
  <path d="M 47 40 L 49 42 L 53 38" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Slot -->
  <rect x="40" y="43" width="20" height="3" fill="#333" opacity="0.3"/>
</svg>
